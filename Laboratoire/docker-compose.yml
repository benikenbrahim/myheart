version: '3.8'

services:
  postgres-labo:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: laboratoire_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"

  laboratoire-service:
    build: .
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres-labo:5432/laboratoire_db
    depends_on:
      - postgres-labo